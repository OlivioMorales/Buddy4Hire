<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book George — Buddy4Hire</title>

    <meta name="description" content="Book George the Cat for companionship, judgment, or emotional support through Buddy4Hire.">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About George</a></li>
            <li><a href="services.html">Rental Packages</a></li>
            <li><a href="contact.html" aria-current="page">Book George</a></li>
        </ul>
    </nav>

    <!-- Dark Mode Toggle -->
    <button id="darkModeToggle" class="dark-toggle">🌙 Dark Mode</button>
</header>

<main>
    <section class="contact-hero">
        <h1>Book George</h1>
        <p>Fill out the form below to request your time with George.  
        He will review your application carefully (and silently judge it).</p>
    </section>

    <section class="contact-form-section">
        <h2>Reservation Form</h2>

        <form id="bookingForm" action="#" method="post" class="booking-form">
            <div class="form-group">
                <label for="name">Your Name:</label>
                <input type="text" id="name" name="name" required placeholder="Enter your full name">
            </div>

            <div class="form-group">
                <label for="email">Your Email:</label>
                <input type="email" id="email" name="email" required placeholder="you@example.com">
            </div>

            <div class="form-group">
                <label for="package">Select Rental Package:</label>
                <select id="package" name="package" required>
                    <option value="">-- Choose a package --</option>
                    <option value="bronze">Bronze — The Casual Acquaintance</option>
                    <option value="silver">Silver — The Almost‑Friend</option>
                    <option value="gold">Gold — The Full George Experience</option>
                    <option value="platinum">Platinum — George’s Ultimate Approval</option>
                </select>
            </div>

            <div class="form-group">
                <label for="date">Preferred Date:</label>
                <input type="date" id="date" name="date" required>
            </div>

            <div class="form-group">
                <label for="message">Additional Notes:</label>
                <textarea id="message" name="message" rows="5" placeholder="Tell us anything George should know..."></textarea>
            </div>

            <button type="submit" class="cta-button">Submit Request</button>
        </form>
    </section>
</main>

<footer>
    <p>&copy; 2026 Buddy4Hire — George the Cat Rental Service</p>
</footer>
<script src="script.js"></script>
</body>
</html>
